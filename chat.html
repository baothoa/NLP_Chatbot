<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chewy Chewy AI – RAG Chatbot</title>
<style>
  :root {
    --cream: #fff8f0;
    --caramel: #c47c3e;
    --caramel-dark: #8b5228;
    --caramel-light: #e8a96b;
    --brown: #5c3317;
    --blush: #f7d6c4;
    --rose: #e8a0a0;
    --gold: #f5c842;
    --white: #ffffff;
    --glass: rgba(255,255,255,0.55);
    --shadow: rgba(100,50,10,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #fde8d0 0%, #fcd5b5 40%, #f7c4a0 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
  }

  /* Decorative bg blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 420px; height: 420px;
    background: radial-gradient(circle, #e8a96b, transparent);
    top: -100px; left: -100px;
  }
  body::after {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #f5c842, transparent);
    bottom: -80px; right: -60px;
  }

  .chat-wrapper {
    position: relative;
    z-index: 1;
    width: 460px;
    max-width: 100%;
    display: flex;
    flex-direction: column;
    height: 92vh;
    max-height: 780px;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 24px 60px var(--shadow), 0 4px 16px rgba(0,0,0,0.08);
    backdrop-filter: blur(2px);
    background: var(--glass);
    border: 1.5px solid rgba(255,255,255,0.7);
  }

  /* ── HEADER ── */
  .chat-header {
    background: linear-gradient(135deg, var(--caramel-dark) 0%, var(--caramel) 100%);
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    gap: 13px;
    position: relative;
    flex-shrink: 0;
  }
  .header-avatar {
    width: 52px; height: 52px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    border: 2px solid rgba(255,255,255,0.5);
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-text h2 {
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.3px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .header-text p {
    color: rgba(255,255,255,0.88);
    font-size: 11.5px;
    margin-top: 3px;
  }
  .rag-badge {
    position: absolute;
    right: 16px; top: 14px;
    background: rgba(255,255,255,0.22);
    border: 1px solid rgba(255,255,255,0.45);
    color: #fff;
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
    backdrop-filter: blur(4px);
  }

  /* ── CHAT BOX ── */
  .chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 18px 16px 10px;
    background: rgba(255,252,248,0.75);
    backdrop-filter: blur(6px);
    scroll-behavior: smooth;
  }
  .chat-box::-webkit-scrollbar { width: 5px; }
  .chat-box::-webkit-scrollbar-thumb { background: #d9b99a; border-radius: 4px; }

  /* ── MESSAGES ── */
  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    margin-bottom: 16px;
    animation: slideUp 0.25s ease-out both;
  }
  .msg-row.user { flex-direction: row-reverse; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  }
  .avatar.bot { background: linear-gradient(135deg, #e8c49a, #c47c3e); }
  .avatar.user { background: linear-gradient(135deg, #b5d8f7, #6baed6); }

  .bubble {
    max-width: 78%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.65;
    position: relative;
    white-space: pre-line;
    word-break: break-word;
  }
  .bubble.bot {
    background: rgba(255,255,255,0.82);
    border: 1px solid rgba(196,124,62,0.18);
    border-bottom-left-radius: 5px;
    box-shadow: 0 3px 12px rgba(100,50,10,0.1);
    backdrop-filter: blur(4px);
  }
  .bubble.user {
    background: linear-gradient(135deg, #c47c3e, #8b5228);
    color: #fff;
    border-bottom-right-radius: 5px;
    box-shadow: 0 3px 12px rgba(100,50,10,0.2);
  }

  /* Route badge */
  .route-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
    margin-top: 6px;
    margin-right: 4px;
    letter-spacing: 0.3px;
  }
  .route-greeting   { background: #fde8b2; color: #8b6200; }
  .route-product    { background: #d4f1d8; color: #1e6e30; }
  .route-order      { background: #d6eaff; color: #1a4e8a; }
  .route-price      { background: #ffe4f4; color: #8b1a5a; }
  .route-error      { background: #ffd6d6; color: #8b0000; }
  .route-default    { background: #eee; color: #555; }

  /* RAG context panel */
  .rag-panel {
    margin-top: 8px;
    background: rgba(245,232,210,0.6);
    border: 1px dashed rgba(196,124,62,0.4);
    border-radius: 10px;
    overflow: hidden;
    font-size: 12px;
  }
  .rag-toggle {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 10px;
    cursor: pointer;
    font-weight: 600;
    color: var(--caramel-dark);
    user-select: none;
    justify-content: space-between;
  }
  .rag-toggle:hover { background: rgba(196,124,62,0.08); }
  .rag-toggle .arrow { transition: transform 0.2s; font-size: 10px; }
  .rag-toggle.open .arrow { transform: rotate(90deg); }
  .rag-body {
    padding: 0 10px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s;
  }
  .rag-body.open { max-height: 120px; padding: 0 10px 8px; }
  .rag-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
  .rag-chip {
    background: rgba(255,255,255,0.8);
    border: 1px solid rgba(196,124,62,0.25);
    border-radius: 20px;
    padding: 3px 9px;
    font-size: 11px;
    color: var(--brown);
  }

  /* Product cards */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
    margin-top: 10px;
  }
  .product-card {
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
    border: 1px solid rgba(196,124,62,0.2);
    box-shadow: 0 2px 8px rgba(100,50,10,0.1);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .product-card:hover {
    transform: scale(1.04);
    box-shadow: 0 6px 18px rgba(100,50,10,0.2);
  }
  .product-card img {
    width: 100%; aspect-ratio: 1;
    object-fit: cover;
    display: block;
  }
  .product-card-footer {
    padding: 5px 7px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-quick {
    font-size: 10.5px;
    background: linear-gradient(135deg, var(--caramel), var(--caramel-dark));
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 4px 8px;
    cursor: pointer;
    width: 100%;
    font-weight: 600;
    letter-spacing: 0.2px;
    transition: opacity 0.2s;
  }
  .btn-quick:hover { opacity: 0.85; }

  /* Typing indicator */
  .typing-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 16px; }
  .typing-bubble {
    background: rgba(255,255,255,0.82);
    border: 1px solid rgba(196,124,62,0.18);
    border-radius: 18px; border-bottom-left-radius: 5px;
    padding: 12px 16px;
    box-shadow: 0 3px 12px rgba(100,50,10,0.1);
    display: flex; align-items: center; gap: 5px;
  }
  .dot {
    width: 7px; height: 7px;
    background: var(--caramel);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); opacity: 0.5; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── SUGGESTIONS ── */
  .suggestions {
    padding: 8px 14px 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    background: rgba(255,252,248,0.85);
    border-top: 1px solid rgba(196,124,62,0.12);
    flex-shrink: 0;
  }
  .sug-chip {
    background: rgba(255,255,255,0.75);
    border: 1.5px solid rgba(196,124,62,0.3);
    color: var(--caramel-dark);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s;
    backdrop-filter: blur(4px);
    white-space: nowrap;
  }
  .sug-chip:hover {
    background: rgba(196,124,62,0.15);
    transform: translateY(-1px);
  }

  /* ── INPUT AREA ── */
  .input-area {
    display: flex;
    padding: 10px 14px 14px;
    gap: 8px;
    background: rgba(255,252,248,0.9);
    backdrop-filter: blur(6px);
    border-top: 1px solid rgba(196,124,62,0.15);
    flex-shrink: 0;
    align-items: center;
  }
  .input-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.75);
    border: 1.5px solid rgba(196,124,62,0.3);
    border-radius: 24px;
    padding: 0 14px;
    box-shadow: inset 0 2px 6px rgba(100,50,10,0.06);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrap:focus-within {
    border-color: var(--caramel);
    box-shadow: 0 0 0 3px rgba(196,124,62,0.12);
  }
  .input-wrap input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    padding: 11px 0;
    font-size: 14px;
    color: var(--brown);
  }
  .input-wrap input::placeholder { color: #c4a080; }

  .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--caramel), var(--caramel-dark));
    color: #fff;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(139,82,40,0.4);
    transition: transform 0.15s, opacity 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover:not(:disabled) { transform: scale(1.08); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .send-btn .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FOOTER ── */
  .chat-footer {
    text-align: center;
    font-size: 10.5px;
    color: var(--caramel-dark);
    opacity: 0.75;
    padding: 6px 10px 10px;
    background: rgba(255,252,248,0.9);
    flex-shrink: 0;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 500px) {
    body { padding: 0; }
    .chat-wrapper { width: 100%; height: 100vh; max-height: 100vh; border-radius: 0; }
  }
</style>
</head>
<body>

<div class="chat-wrapper">

  <!-- HEADER -->
  <div class="chat-header">
    <div class="header-avatar">🎂</div>
    <div class="header-text">
      <h2>Chewy Chewy AI</h2>
      <p>Trợ lý thông minh RAG – Tư vấn bánh từ kho tri thức</p>
    </div>
    <div class="rag-badge">✦ RAG</div>
  </div>

  <!-- CHAT BOX -->
  <div id="chatBox" class="chat-box"></div>

  <!-- SUGGESTIONS -->
  <div class="suggestions">
    <span class="sug-chip" onclick="suggest('Bánh sinh nhật')">🎂 Bánh sinh nhật</span>
    <span class="sug-chip" onclick="suggest('Bánh chocolate')">🍫 Bánh chocolate</span>
    <span class="sug-chip" onclick="suggest('Quà tặng')">🎁 Quà tặng</span>
    <span class="sug-chip" onclick="suggest('Giá bánh')">💰 Giá bánh</span>
    <span class="sug-chip" onclick="suggest('Bánh ít đường')">🌿 Bánh ít đường</span>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-wrap">
      <input id="userInput" type="text" placeholder="Nhập câu hỏi của bạn..." autocomplete="off"/>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Gửi">
      <span id="sendIcon">➤</span>
    </button>
  </div>

  <!-- FOOTER -->
  <div class="chat-footer">
    💡 Được hỗ trợ bởi RAG – Câu trả lời từ kho tri thức bánh ngọt Chewy Chewy
  </div>

</div>

<script>
  const SESSION_ID = "session_" + Date.now();
  const API_URL = "http://localhost:5001/api/v1/chewy_chewy";

  let isLoading = false;

  // ─── Route helpers ───
  const routeColor = r => {
    if (!r) return 'default';
    const l = r.toLowerCase();
    if (l.includes('greet')) return 'greeting';
    if (l.includes('product') || l.includes('bánh')) return 'product';
    if (l.includes('order') || l.includes('đặt')) return 'order';
    if (l.includes('price') || l.includes('giá')) return 'price';
    if (l.includes('error')) return 'error';
    return 'default';
  };
  const routeLabel = r => r ? r.replace(/_/g,' ') : 'response';

  // ─── RAG context mock ───
  function ragInfo(route, productCount) {
    const src = {
      greeting: 'Kịch bản chào hỏi',
      product: 'Danh mục bánh & đánh giá khách hàng',
      order: 'Quy trình đặt hàng',
      price: 'Bảng giá sản phẩm',
      error: 'Xử lý lỗi hệ thống',
      default: 'Cơ sở dữ liệu tổng hợp'
    }[routeColor(route)] || 'Kho tri thức Chewy Chewy';
    return { source: src, count: productCount };
  }

  // ─── Add bot message ───
  function addBotMessage(content, route, products) {
    const chatBox = document.getElementById('chatBox');
    const row = document.createElement('div');
    row.className = 'msg-row';

    const avEl = document.createElement('div');
    avEl.className = 'avatar bot';
    avEl.textContent = '👩‍🍳';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bot';

    // Text content
    const textDiv = document.createElement('div');
    textDiv.textContent = content;
    bubble.appendChild(textDiv);

    // Route badge
    if (route) {
      const badge = document.createElement('span');
      badge.className = `route-badge route-${routeColor(route)}`;
      badge.textContent = '◈ ' + routeLabel(route);
      bubble.appendChild(badge);
    }

    // Product cards
    if (products && products.length > 0) {
      const grid = document.createElement('div');
      grid.className = 'product-grid';
      products.forEach(url => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <img src="${url}" alt="Sản phẩm" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23f5e0c8%22 width=%22100%22 height=%22100%22/><text y=%2256%22 x=%2250%22 font-size=%2236%22 text-anchor=%22middle%22>🎂</text></svg>'"/>
          <div class="product-card-footer">
            <button class="btn-quick">🔍 Xem nhanh</button>
          </div>
        `;
        grid.appendChild(card);
      });
      bubble.appendChild(grid);
    }

    // RAG panel
    const { source, count } = ragInfo(route, products ? products.length : 0);
    const ragDiv = document.createElement('div');
    ragDiv.className = 'rag-panel';
    const pId = 'rag_' + Date.now();
    ragDiv.innerHTML = `
      <div class="rag-toggle" onclick="toggleRag('${pId}', this)">
        <span>📚 Kiến thức đã tra cứu (RAG)</span>
        <span class="arrow">▶</span>
      </div>
      <div class="rag-body" id="${pId}">
        <div class="rag-chips">
          <span class="rag-chip">📖 Nguồn: ${source}</span>
          ${count > 0 ? `<span class="rag-chip">🍰 ${count} sản phẩm phù hợp</span>` : ''}
          ${route ? `<span class="rag-chip">🔍 Tuyến: ${routeLabel(route)}</span>` : ''}
          <span class="rag-chip">⚡ RAG retrieval</span>
        </div>
      </div>
    `;
    bubble.appendChild(ragDiv);

    row.appendChild(avEl);
    row.appendChild(bubble);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function toggleRag(id, btn) {
    const body = document.getElementById(id);
    const isOpen = body.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
  }

  // ─── Add user message ───
  function addUserMessage(text) {
    const chatBox = document.getElementById('chatBox');
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="avatar user">🙋</div>
      <div class="bubble user">${escHtml(text)}</div>
    `;
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ─── Typing indicator ───
  function showTyping() {
    const chatBox = document.getElementById('chatBox');
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.id = 'typingRow';
    row.innerHTML = `
      <div class="avatar bot">👩‍🍳</div>
      <div class="typing-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    `;
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
  }
  function removeTyping() {
    const el = document.getElementById('typingRow');
    if (el) el.remove();
  }

  // ─── Loading state ───
  function setLoading(on) {
    isLoading = on;
    const btn = document.getElementById('sendBtn');
    const icon = document.getElementById('sendIcon');
    const inp = document.getElementById('userInput');
    btn.disabled = on;
    inp.disabled = on;
    if (on) {
      icon.outerHTML = '<div class="spinner" id="sendIcon"></div>';
    } else {
      const sp = document.getElementById('sendIcon');
      if (sp) sp.outerHTML = '<span id="sendIcon">➤</span>';
    }
  }

  // ─── Send message ───
  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('userInput');
    const query = input.value.trim();
    if (!query) return;

    addUserMessage(query);
    input.value = '';
    setLoading(true);
    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: SESSION_ID, query })
      });
      const data = await res.json();
      removeTyping();
      addBotMessage(data.content || '(Không có nội dung)', data.route, data.products);
    } catch(e) {
      removeTyping();
      addBotMessage('⚠️ Không kết nối được server. Vui lòng kiểm tra backend Flask và thử lại nhé!', 'error', []);
    } finally {
      setLoading(false);
      document.getElementById('userInput').focus();
    }
  }

  // ─── Suggestion chip ───
  function suggest(text) {
    if (isLoading) return;
    document.getElementById('userInput').value = text;
    sendMessage();
  }

  // ─── Enter key ───
  document.getElementById('userInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !isLoading) sendMessage();
  });

  // ─── Initial greeting ───
  window.addEventListener('DOMContentLoaded', () => {
    addBotMessage(
      'Xin chào! Mình là trợ lý AI của Chewy Chewy 🎂\nMình sử dụng công nghệ RAG để tìm bánh phù hợp nhất cho bạn từ kho tri thức của chúng mình.\n\nBạn muốn tìm bánh sinh nhật, bánh chocolate hay bánh làm quà tặng?',
      'greeting',
      []
    );
  });
</script>
</body>
</html>
