<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Chewy Chewy AI Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f1ea;
      margin: 0;
      padding: 0;
    }

    .chat-container {
      width: 430px;
      margin: 40px auto;
      background: white;
      border-radius: 18px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    .chat-header {
      background: #8b5e3c;
      color: white;
      padding: 18px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .chat-box {
      height: 420px;
      padding: 16px;
      overflow-y: auto;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      margin-bottom: 12px;
      border-radius: 14px;
      line-height: 1.4;
    }

    .user {
      background: #dceeff;
      margin-left: auto;
    }

    .bot {
      background: #f1dfcd;
      margin-right: auto;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }

    input {
      flex: 1;
      padding: 14px;
      border: none;
      outline: none;
      font-size: 15px;
    }

    button {
      padding: 14px 20px;
      border: none;
      background: #8b5e3c;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #70462b;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">Chewy Chewy AI Chatbot</div>

    <div id="chatBox" class="chat-box">
      <div class="message bot">
        Xin chào, mình là chatbot tư vấn bánh của Chewy Chewy. Bạn muốn tìm bánh gì hôm nay?
      </div>
    </div>

    <div class="input-area">
      <input id="userInput" type="text" placeholder="Nhập câu hỏi..." />
      <button onclick="sendMessage()">Gửi</button>
    </div>
  </div>

  <script>
    const sessionId = "demo_session";

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const chatBox = document.getElementById("chatBox");
      const query = input.value.trim();

      if (!query) return;

      chatBox.innerHTML += `<div class="message user">${query}</div>`;
      input.value = "";

      try {
        const response = await fetch("http://localhost:5001/api/v1/chewy_chewy", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            session_id: sessionId,
            query: query,
          }),
        });

        const data = await response.json();

        chatBox.innerHTML += `<div class="message bot">${data.content}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
      } catch (error) {
        chatBox.innerHTML += `<div class="message bot">Không kết nối được server Flask.</div>`;
      }
    }

    document.getElementById("userInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
